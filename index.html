<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ðŸ’° Negocio Pro</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ============================================================
   VARIABLES
============================================================ */
:root {
  --rojo:      #C0392B;
  --rojo-dk:   #922B21;
  --rojo-bg:   #1C0808;
  --verde:     #00B894;
  --verde-bg:  #071A16;
  --amarillo:  #F0C040;
  --azul:      #2980B9;
  --gris1:     #0D0D0D;
  --gris2:     #161616;
  --gris3:     #1E1E1E;
  --gris4:     #272727;
  --gris5:     #333333;
  --linea:     #2C2C2C;
  --texto:     #EFEFEF;
  --texto2:    #888;
  --texto3:    #555;
  --r:         13px;
  --font-h:    'Barlow Condensed', sans-serif;
  --font-b:    'Barlow', sans-serif;
  --sombra:    0 4px 24px rgba(0,0,0,.55);
}

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

html, body {
  height: 100%;
  font-family: var(--font-b);
  background: var(--gris1);
  color: var(--texto);
  overflow-x: hidden;
}

/* ============================================================
   LAYOUT SHELL â€” fixed header + fixed bottom nav + scroll body
============================================================ */
#app {
  max-width: 480px;
  margin: 0 auto;
  position: relative;
}

/* ============================================================
   HEADER
============================================================ */
.header {
  background: linear-gradient(135deg, #1A0505 0%, #2D0A0A 100%);
  border-bottom: 2px solid var(--rojo-dk);
  padding: 14px 16px 12px;
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  max-width: 480px;
  margin: 0 auto;
  z-index: 100;
  /* let JS measure and set --header-h */
}

.header-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 4px;
}

.app-title {
  font-family: var(--font-h);
  font-size: 13px;
  font-weight: 700;
  color: var(--texto2);
  letter-spacing: 2px;
  text-transform: uppercase;
}

.header-fecha {
  font-size: 11px;
  color: var(--texto3);
  font-weight: 600;
}

.negocio-activo {
  font-family: var(--font-h);
  font-size: 26px;
  font-weight: 900;
  letter-spacing: .5px;
  color: var(--texto);
  line-height: 1;
}

.negocio-activo span {
  color: var(--amarillo);
}

.ganancia-header {
  display: flex;
  align-items: baseline;
  gap: 6px;
  margin-top: 6px;
}

.ganancia-lbl {
  font-size: 11px;
  font-weight: 700;
  color: var(--texto3);
  letter-spacing: 1px;
  text-transform: uppercase;
}

.ganancia-val {
  font-family: var(--font-h);
  font-size: 28px;
  font-weight: 900;
  line-height: 1;
  transition: color .3s;
}

.ganancia-val.pos { color: var(--verde); }
.ganancia-val.neg { color: var(--rojo); }
.ganancia-val.neu { color: var(--texto2); }

/* ============================================================
   SCROLL CONTENT â€” sits between fixed header and fixed bottom nav
============================================================ */
.content {
  position: fixed;
  top: var(--header-h, 120px);
  left: 0;
  right: 0;
  bottom: 65px; /* height of bottom nav */
  max-width: 480px;
  margin: 0 auto;
  overflow-y: auto;
  overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
  background: var(--gris1);
}
.content::-webkit-scrollbar { display: none; }

.page { padding: 14px 16px 28px; display: none; }
.page.active { display: block; }

/* ============================================================
   BOTTOM NAV â€” always fixed at bottom, never scrolls away
============================================================ */
.bottom-nav {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  max-width: 480px;
  margin: 0 auto;
  height: 65px;
  background: #111111;
  border-top: 1px solid #2A2A2A;
  display: flex;
  align-items: stretch;
  z-index: 150;
  box-shadow: 0 -4px 20px rgba(0,0,0,0.6);
}

.bnav {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 8px 4px 6px;
  cursor: pointer;
  border: none;
  background: none;
  color: #555555;
  font-family: var(--font-b);
  transition: color .18s, background .18s;
  position: relative;
  gap: 3px;
  -webkit-tap-highlight-color: transparent;
}

.bnav:active {
  background: rgba(192, 57, 43, 0.08);
}

.bnav .bico {
  font-size: 22px;
  line-height: 1;
  display: block;
}

.bnav .blbl {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.3px;
  line-height: 1;
  display: block;
  text-transform: uppercase;
}

/* Active state */
.bnav.active {
  color: #C0392B;
}

/* Red indicator bar on top of active tab */
.bnav.active::after {
  content: '';
  position: absolute;
  top: 0;
  left: 15%;
  right: 15%;
  height: 3px;
  background: #C0392B;
  border-radius: 0 0 4px 4px;
}

/* Active icon gets a subtle glow pill background */
.bnav.active .bico {
  filter: drop-shadow(0 0 6px rgba(192,57,43,0.5));
}

/* ============================================================
   SECTION TITLE
============================================================ */
.sec-title {
  font-family: var(--font-h);
  font-size: 20px;
  font-weight: 800;
  letter-spacing: .5px;
  margin-bottom: 14px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

/* ============================================================
   CARDS
============================================================ */
.card {
  background: var(--gris3);
  border: 1.5px solid var(--linea);
  border-radius: var(--r);
  padding: 14px 15px;
  margin-bottom: 10px;
  box-shadow: var(--sombra);
}

.card-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
}

/* ============================================================
   STAT BOXES
============================================================ */
.stat-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 14px;
}

.stat-box {
  background: var(--gris3);
  border: 1.5px solid var(--linea);
  border-radius: var(--r);
  padding: 13px 14px;
}

.stat-lbl {
  font-size: 10px;
  font-weight: 700;
  color: var(--texto3);
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-bottom: 4px;
}

.stat-val {
  font-family: var(--font-h);
  font-size: 24px;
  font-weight: 900;
  line-height: 1;
}

.stat-val.verde { color: var(--verde); }
.stat-val.rojo  { color: var(--rojo); }
.stat-val.amarillo { color: var(--amarillo); }

/* ============================================================
   NEGOCIOS
============================================================ */
.negocio-card {
  background: var(--gris3);
  border: 1.5px solid var(--linea);
  border-radius: var(--r);
  padding: 15px 16px;
  margin-bottom: 10px;
  cursor: pointer;
  transition: border-color .2s, transform .1s;
  display: flex;
  align-items: center;
  justify-content: space-between;
  box-shadow: var(--sombra);
}
.negocio-card:active { transform: scale(.98); }
.negocio-card.selected { border-color: var(--rojo); background: linear-gradient(135deg, #1A0808, var(--gris3)); }

.neg-left {}
.neg-emoji { font-size: 28px; margin-bottom: 4px; }
.neg-nombre { font-family: var(--font-h); font-size: 20px; font-weight: 800; }
.neg-tipo { font-size: 11px; color: var(--texto2); margin-top: 2px; }

.neg-right { text-align: right; }
.neg-gan-lbl { font-size: 10px; font-weight: 700; color: var(--texto3); letter-spacing: .5px; text-transform: uppercase; }
.neg-gan-val {
  font-family: var(--font-h);
  font-size: 22px;
  font-weight: 900;
}
.neg-gan-val.pos { color: var(--verde); }
.neg-gan-val.neg { color: var(--rojo); }
.neg-gan-val.neu { color: var(--texto2); }

.neg-actions {
  display: flex;
  gap: 6px;
  margin-top: 6px;
  justify-content: flex-end;
}

/* ============================================================
   ITEMS LIST (gastos/ingresos)
============================================================ */
.item-card {
  background: var(--gris3);
  border: 1.5px solid var(--linea);
  border-radius: var(--r);
  padding: 12px 14px;
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 10px;
}

.item-ico {
  width: 38px; height: 38px;
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
  flex-shrink: 0;
}
.item-ico.gasto   { background: var(--rojo-bg); }
.item-ico.ingreso { background: var(--verde-bg); }
.item-ico.extra   { background: #1A1500; }

.item-info { flex: 1; min-width: 0; }
.item-nombre {
  font-size: 14px;
  font-weight: 700;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.item-meta { font-size: 11px; color: var(--texto2); margin-top: 2px; }

.item-monto {
  font-family: var(--font-h);
  font-size: 18px;
  font-weight: 800;
  text-align: right;
  flex-shrink: 0;
}
.item-monto.gasto   { color: var(--rojo); }
.item-monto.ingreso { color: var(--verde); }
.item-monto.extra   { color: var(--amarillo); }

.item-monto-sub { font-size: 10px; font-weight: 600; opacity: .7; }

.item-btns { display: flex; flex-direction: column; gap: 5px; }

/* ============================================================
   TOTAL BARS
============================================================ */
.total-bar {
  border-radius: var(--r);
  padding: 12px 15px;
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.total-bar.ingresos { background: var(--verde-bg); border: 1.5px solid var(--verde); }
.total-bar.gastos   { background: var(--rojo-bg);  border: 1.5px solid var(--rojo); }
.total-bar.extras   { background: #1A1500; border: 1.5px solid var(--amarillo); }

.total-bar .tb-lbl { font-size: 12px; font-weight: 700; letter-spacing: .5px; text-transform: uppercase; }
.total-bar.ingresos .tb-lbl { color: var(--verde); }
.total-bar.gastos   .tb-lbl { color: var(--rojo); }
.total-bar.extras   .tb-lbl { color: var(--amarillo); }

.total-bar .tb-val {
  font-family: var(--font-h);
  font-size: 26px;
  font-weight: 900;
}
.total-bar.ingresos .tb-val { color: var(--verde); }
.total-bar.gastos   .tb-val { color: var(--rojo); }
.total-bar.extras   .tb-val { color: var(--amarillo); }

/* ============================================================
   RESUMEN GRANDE
============================================================ */
.resumen-grande {
  border-radius: 18px;
  padding: 22px 20px;
  margin-bottom: 14px;
  text-align: center;
}
.resumen-grande.pos { background: linear-gradient(135deg, #051A13, #0A2E20); border: 2px solid var(--verde); }
.resumen-grande.neg { background: linear-gradient(135deg, #1C0808, #2D1010); border: 2px solid var(--rojo); }
.resumen-grande.neu { background: var(--gris3); border: 2px solid var(--linea); }

.rg-lbl { font-size: 12px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 6px; }
.resumen-grande.pos .rg-lbl { color: var(--verde); }
.resumen-grande.neg .rg-lbl { color: var(--rojo); }
.resumen-grande.neu .rg-lbl { color: var(--texto2); }

.rg-val {
  font-family: var(--font-h);
  font-size: 52px;
  font-weight: 900;
  line-height: 1;
}
.resumen-grande.pos .rg-val { color: var(--verde); }
.resumen-grande.neg .rg-val { color: var(--rojo); }
.resumen-grande.neu .rg-val { color: var(--texto2); }

.rg-estado {
  font-size: 14px;
  font-weight: 600;
  margin-top: 6px;
}
.resumen-grande.pos .rg-estado { color: rgba(0,184,148,.7); }
.resumen-grande.neg .rg-estado { color: rgba(192,57,43,.7); }

/* ============================================================
   FORMULARIOS / MODALES
============================================================ */
.overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.8);
  z-index: 300;
  align-items: flex-end;
  justify-content: center;
}
.overlay.open { display: flex; }

.sheet {
  background: var(--gris2);
  border-radius: 20px 20px 0 0;
  border-top: 2px solid var(--rojo);
  padding: 20px 18px 28px;
  width: 100%;
  max-width: 480px;
  max-height: 90vh;
  overflow-y: auto;
}
.sheet.blue { border-top-color: var(--azul); }
.sheet.verde { border-top-color: var(--verde); }

.sheet-title {
  font-family: var(--font-h);
  font-size: 22px;
  font-weight: 800;
  margin-bottom: 16px;
}

.form-group {
  margin-bottom: 12px;
}
.form-lbl {
  font-size: 11px;
  font-weight: 700;
  color: var(--texto2);
  letter-spacing: .5px;
  text-transform: uppercase;
  margin-bottom: 5px;
  display: block;
}
.form-input {
  width: 100%;
  background: var(--gris4);
  border: 1.5px solid var(--linea);
  border-radius: 10px;
  color: var(--texto);
  padding: 12px 13px;
  font-size: 15px;
  font-weight: 600;
  outline: none;
  font-family: var(--font-b);
  transition: border-color .15s;
}
.form-input:focus { border-color: var(--rojo); }

.form-select {
  width: 100%;
  background: var(--gris4);
  border: 1.5px solid var(--linea);
  border-radius: 10px;
  color: var(--texto);
  padding: 12px 13px;
  font-size: 15px;
  font-weight: 600;
  outline: none;
  font-family: var(--font-b);
  appearance: none;
  cursor: pointer;
}
.form-select:focus { border-color: var(--rojo); }

.form-row { display: flex; gap: 10px; }
.form-row .form-group { flex: 1; }

/* ============================================================
   BUTTONS
============================================================ */
.btn {
  border: none;
  border-radius: 11px;
  padding: 13px 18px;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  font-family: var(--font-b);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  transition: opacity .15s, transform .1s;
}
.btn:active { opacity: .85; transform: scale(.98); }

.btn-rojo   { background: var(--rojo); color: #fff; }
.btn-verde  { background: var(--verde); color: #fff; }
.btn-gris   { background: var(--gris5); color: var(--texto2); border: 1.5px solid var(--linea); }
.btn-warn   { background: #2A1800; color: var(--amarillo); border: 1.5px solid #5A3500; }

.btn-full  { width: 100%; }
.btn-sm    { padding: 7px 12px; font-size: 12px; border-radius: 8px; }

.btn-row { display: flex; gap: 10px; margin-top: 14px; }
.btn-row .btn { flex: 1; }

.ico-btn {
  background: none;
  border: none;
  color: var(--texto3);
  font-size: 16px;
  cursor: pointer;
  padding: 5px 6px;
  border-radius: 7px;
}
.ico-btn:hover { color: var(--texto); }

/* ============================================================
   DIVIDER
============================================================ */
.divider {
  height: 1px;
  background: var(--linea);
  margin: 14px 0;
}

/* ============================================================
   EMPTY STATE
============================================================ */
.empty {
  text-align: center;
  padding: 32px 20px;
  color: var(--texto2);
}
.empty .eico { font-size: 38px; margin-bottom: 10px; }
.empty .etxt { font-size: 14px; }

/* ============================================================
   TOAST
============================================================ */
.toast {
  position: fixed;
  bottom: 80px;
  left: 50%;
  transform: translateX(-50%) translateY(12px);
  background: var(--gris4);
  border: 1px solid var(--linea);
  color: var(--texto);
  padding: 10px 20px;
  border-radius: 12px;
  font-size: 13px;
  font-weight: 600;
  opacity: 0;
  pointer-events: none;
  transition: all .28s;
  z-index: 999;
  white-space: nowrap;
  box-shadow: var(--sombra);
  font-family: var(--font-b);
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ============================================================
   CHIPS TIPO GASTO
============================================================ */
.tipo-chips {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}
.tipo-chip {
  padding: 7px 14px;
  border-radius: 20px;
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  border: 1.5px solid var(--linea);
  background: var(--gris4);
  color: var(--texto2);
  font-family: var(--font-b);
  transition: all .15s;
}
.tipo-chip.selected-diario   { border-color:var(--rojo); color:var(--rojo); background:var(--rojo-bg); }
.tipo-chip.selected-duracion { border-color:var(--azul); color:var(--azul); background:#0A1828; }
.tipo-chip.selected-extra    { border-color:var(--amarillo); color:var(--amarillo); background:#1A1500; }

/* ============================================================
   BACKUP SECTION
============================================================ */
.backup-row {
  display: flex;
  gap: 10px;
  margin-top: 10px;
}

/* ============================================================
   NUEVO DÃA FLOATING BTN
============================================================ */
.fab {
  position: fixed;
  bottom: 80px;
  right: 16px;
  z-index: 200;
  background: var(--rojo);
  color: white;
  border: none;
  border-radius: 14px;
  padding: 12px 16px;
  font-size: 12px;
  font-weight: 700;
  cursor: pointer;
  font-family: var(--font-b);
  box-shadow: 0 4px 20px rgba(192,57,43,.5);
  display: flex;
  align-items: center;
  gap: 6px;
  transition: opacity .2s;
}
.fab:active { opacity: .85; }
.fab.hidden { display: none; }

/* ============================================================
   PROGRESS BAR (margen)
============================================================ */
.progress-wrap {
  background: var(--gris4);
  border-radius: 6px;
  height: 8px;
  overflow: hidden;
  margin-top: 8px;
}
.progress-bar {
  height: 100%;
  border-radius: 6px;
  transition: width .4s;
}

/* Breakdown lines in resumen */
.breakdown-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 9px 0;
  border-bottom: 1px solid var(--linea);
}
.breakdown-item:last-child { border-bottom: none; }
.breakdown-nombre { font-size: 13px; color: var(--texto2); }
.breakdown-tipo {
  font-size: 10px;
  font-weight: 700;
  padding: 2px 7px;
  border-radius: 5px;
  margin-top: 2px;
}
.bt-diario   { background: var(--rojo-bg); color: var(--rojo); }
.bt-duracion { background: #0A1828; color: var(--azul); }
.bt-extra    { background: #1A1500; color: var(--amarillo); }
.breakdown-monto { font-weight: 700; font-size: 14px; }

/* ============================================================
   RESUMEN SEMANAL â€” bloque separado
============================================================ */
.bloque-periodo {
  margin-bottom: 16px;
}

.periodo-header {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 10px;
}

.periodo-badge {
  font-family: var(--font-h);
  font-size: 11px;
  font-weight: 800;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  padding: 4px 10px;
  border-radius: 6px;
}
.periodo-badge.dia    { background: #1A0C0C; color: var(--rojo); border: 1px solid var(--rojo-dk); }
.periodo-badge.semana { background: #0A1020; color: #5DADE2;     border: 1px solid #1F5A8A; }

.periodo-fecha-rango {
  font-size: 11px;
  color: var(--texto3);
  font-weight: 600;
}

.periodo-grid {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 8px;
  margin-bottom: 10px;
}

.periodo-stat {
  background: var(--gris3);
  border: 1.5px solid var(--linea);
  border-radius: 11px;
  padding: 11px 10px;
  text-align: center;
}

.periodo-stat .ps-lbl {
  font-size: 9px;
  font-weight: 800;
  letter-spacing: .8px;
  text-transform: uppercase;
  color: var(--texto3);
  margin-bottom: 5px;
}

.periodo-stat .ps-val {
  font-family: var(--font-h);
  font-size: 19px;
  font-weight: 900;
  line-height: 1;
}

.periodo-stat.ing  { border-color: rgba(0,184,148,.25); }
.periodo-stat.ing .ps-val { color: var(--verde); }
.periodo-stat.gas  { border-color: rgba(192,57,43,.25); }
.periodo-stat.gas .ps-val { color: var(--rojo); }
.periodo-stat.gan.pos { border-color: var(--verde); bac
