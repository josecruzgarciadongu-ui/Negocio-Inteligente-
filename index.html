<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ðŸ’° Negocio Pro</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ============================================================
   VARIABLES
============================================================ */
:root {
  --rojo:      #C0392B;
  --rojo-dk:   #922B21;
  --rojo-bg:   #1C0808;
  --verde:     #00B894;
  --verde-bg:  #071A16;
  --amarillo:  #F0C040;
  --azul:      #2980B9;
  --gris1:     #0D0D0D;
  --gris2:     #161616;
  --gris3:     #1E1E1E;
  --gris4:     #272727;
  --gris5:     #333333;
  --linea:     #2C2C2C;
  --texto:     #EFEFEF;
  --texto2:    #888;
  --texto3:    #555;
  --r:         13px;
  --font-h:    'Barlow Condensed', sans-serif;
  --font-b:    'Barlow', sans-serif;
  --sombra:    0 4px 24px rgba(0,0,0,.55);
}

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

html, body {
  height: 100%;
  font-family: var(--font-b);
  background: var(--gris1);
  color: var(--texto);
  overflow-x: hidden;
}

/* ============================================================
   LAYOUT SHELL â€” fixed header + fixed bottom nav + scroll body
============================================================ */
#app {
  max-width: 480px;
  margin: 0 auto;
  position: relative;
}

/* ============================================================
   HEADER
============================================================ */
.header {
  background: linear-gradient(135deg, #1A0505 0%, #2D0A0A 100%);
  border-bottom: 2px solid var(--rojo-dk);
  padding: 14px 16px 12px;
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  max-width: 480px;
  margin: 0 auto;
  z-index: 100;
  /* let JS measure and set --header-h */
}

.header-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 4px;
}

.app-title {
  font-family: var(--font-h);
  font-size: 13px;
  font-weight: 700;
  color: var(--texto2);
  letter-spacing: 2px;
  text-transform: uppercase;
}

.header-fecha {
  font-size: 11px;
  color: var(--texto3);
  font-weight: 600;
}

.negocio-activo {
  font-family: var(--font-h);
  font-size: 26px;
  font-weight: 900;
  letter-spacing: .5px;
  color: var(--texto);
  line-height: 1;
}

.negocio-activo span {
  color: var(--amarillo);
}

.ganancia-header {
  display: flex;
  align-items: baseline;
  gap: 6px;
  margin-top: 6px;
}

.ganancia-lbl {
  font-size: 11px;
  font-weight: 700;
  color: var(--texto3);
  letter-spacing: 1px;
  text-transform: uppercase;
}

.ganancia-val {
  font-family: var(--font-h);
  font-size: 28px;
  font-weight: 900;
  line-height: 1;
  transition: color .3s;
}

.ganancia-val.pos { color: var(--verde); }
.ganancia-val.neg { color: var(--rojo); }
.ganancia-val.neu { color: var(--texto2); }

/* ============================================================
   SCROLL CONTENT â€” sits between fixed header and fixed bottom nav
============================================================ */
.content {
  position: fixed;
  top: var(--header-h, 120px);
  left: 0;
  right: 0;
  bottom: 65px; /* height of bottom nav */
  max-width: 480px;
  margin: 0 auto;
  overflow-y: auto;
  overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
  background: var(--gris1);
}
.content::-webkit-scrollbar { display: none; }

.page { padding: 14px 16px 28px; display: none; }
.page.active { display: block; }

/* ============================================================
   BOTTOM NAV â€” always fixed at bottom, never scrolls away
============================================================ */
.bottom-nav {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  max-width: 480px;
  margin: 0 auto;
  height: 65px;
  background: #111111;
  border-top: 1px solid #2A2A2A;
  display: flex;
  align-items: stretch;
  z-index: 150;
  box-shadow: 0 -4px 20px rgba(0,0,0,0.6);
}

.bnav {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 8px 4px 6px;
  cursor: pointer;
  border: none;
  background: none;
  color: #555555;
  font-family: var(--font-b);
  transition: color .18s, background .18s;
  position: relative;
  gap: 3px;
  -webkit-tap-highlight-color: transparent;
}

.bnav:active {
  background: rgba(192, 57, 43, 0.08);
}

.bnav .bico {
  font-size: 22px;
  line-height: 1;
  display: block;
}

.bnav .blbl {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.3px;
  line-height: 1;
  display: block;
  text-transform: uppercase;
}

/* Active state */
.bnav.active {
  color: #C0392B;
}

/* Red indicator bar on top of active tab */
.bnav.active::after {
  content: '';
  position: absolute;
  top: 0;
  left: 15%;
  right: 15%;
  height: 3px;
  background: #C0392B;
  border-radius: 0 0 4px 4px;
}

/* Active icon gets a subtle glow pill background */
.bnav.active .bico {
  filter: drop-shadow(0 0 6px rgba(192,57,43,0.5));
}

/* ============================================================
   SECTION TITLE
============================================================ */
.sec-title {
  font-family: var(--font-h);
  font-size: 20px;
  font-weight: 800;
  letter-spacing: .5px;
  margin-bottom: 14px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

/* ============================================================
   CARDS
============================================================ */
.card {
  background: var(--gris3);
  border: 1.5px solid var(--linea);
  border-radius: var(--r);
  padding: 14px 15px;
  margin-bottom: 10px;
  box-shadow: var(--sombra);
}

.card-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
}

/* ============================================================
   STAT BOXES
============================================================ */
.stat-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 14px;
}

.stat-box {
  background: var(--gris3);
  border: 1.5px solid var(--linea);
  border-radius: var(--r);
  padding: 13px 14px;
}

.stat-lbl {
  font-size: 10px;
  font-weight: 700;
  color: var(--texto3);
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-bottom: 4px;
}

.stat-val {
  font-family: var(--font-h);
  font-size: 24px;
  font-weight: 900;
  line-height: 1;
}

.stat-val.verde { color: var(--verde); }
.stat-val.rojo  { color: var(--rojo); }
.stat-val.amarillo { color: var(--amarillo); }

/* ============================================================
   NEGOCIOS
============================================================ */
.negocio-card {
  background: var(--gris3);
  border: 1.5px solid var(--linea);
  border-radius: var(--r);
  padding: 15px 16px;
  margin-bottom: 10px;
  cursor: pointer;
  transition: border-color .2s, transform .1s;
  display: flex;
  align-items: center;
  justify-content: space-between;
  box-shadow: var(--sombra);
}
.negocio-card:active { transform: scale(.98); }
.negocio-card.selected { border-color: var(--rojo); background: linear-gradient(135deg, #1A0808, var(--gris3)); }

.neg-left {}
.neg-emoji { font-size: 28px; margin-bottom: 4px; }
.neg-nombre { font-family: var(--font-h); font-size: 20px; font-weight: 800; }
.neg-tipo { font-size: 11px; color: var(--texto2); margin-top: 2px; }

.neg-right { text-align: right; }
.neg-gan-lbl { font-size: 10px; font-weight: 700; color: var(--texto3); letter-spacing: .5px; text-transform: uppercase; }
.neg-gan-val {
  font-family: var(--font-h);
  font-size: 22px;
  font-weight: 900;
}
.neg-gan-val.pos { color: var(--verde); }
.neg-gan-val.neg { color: var(--rojo); }
.neg-gan-val.neu { color: var(--texto2); }

.neg-actions {
  display: flex;
  gap: 6px;
  margin-top: 6px;
  justify-content: flex-end;
}

/* ============================================================
   ITEMS LIST (gastos/ingresos)
============================================================ */
.item-card {
  background: var(--gris3);
  border: 1.5px solid var(--linea);
  border-radius: var(--r);
  padding: 12px 14px;
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 10px;
}

.item-ico {
  width: 38px; height: 38px;
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
  flex-shrink: 0;
}
.item-ico.gasto   { background: var(--rojo-bg); }
.item-ico.ingreso { background: var(--verde-bg); }
.item-ico.extra   { background: #1A1500; }

.item-info { flex: 1; min-width: 0; }
.item-nombre {
  font-size: 14px;
  font-weight: 700;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.item-meta { font-size: 11px; color: var(--texto2); margin-top: 2px; }

.item-monto {
  font-family: var(--font-h);
  font-size: 18px;
  font-weight: 800;
  text-align: right;
  flex-shrink: 0;
}
.item-monto.gasto   { color: var(--rojo); }
.item-monto.ingreso { color: var(--verde); }
.item-monto.extra   { color: var(--amarillo); }

.item-monto-sub { font-size: 10px; font-weight: 600; opacity: .7; }

.item-btns { display: flex; flex-direction: column; gap: 5px; }

/* ============================================================
   TOTAL BARS
============================================================ */
.total-bar {
  border-radius: var(--r);
  padding: 12px 15px;
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.total-bar.ingresos { background: var(--verde-bg); border: 1.5px solid var(--verde); }
.total-bar.gastos   { background: var(--rojo-bg);  border: 1.5px solid var(--rojo); }
.total-bar.extras   { background: #1A1500; border: 1.5px solid var(--amarillo); }

.total-bar .tb-lbl { font-size: 12px; font-weight: 700; letter-spacing: .5px; text-transform: uppercase; }
.total-bar.ingresos .tb-lbl { color: var(--verde); }
.total-bar.gastos   .tb-lbl { color: var(--rojo); }
.total-bar.extras   .tb-lbl { color: var(--amarillo); }

.total-bar .tb-val {
  font-family: var(--font-h);
  font-size: 26px;
  font-weight: 900;
}
.total-bar.ingresos .tb-val { color: var(--verde); }
.total-bar.gastos   .tb-val { color: var(--rojo); }
.total-bar.extras   .tb-val { color: var(--amarillo); }

/* ============================================================
   RESUMEN GRANDE
============================================================ */
.resumen-grande {
  border-radius: 18px;
  padding: 22px 20px;
  margin-bottom: 14px;
  text-align: center;
}
.resumen-grande.pos { background: linear-gradient(135deg, #051A13, #0A2E20); border: 2px solid var(--verde); }
.resumen-grande.neg { background: linear-gradient(135deg, #1C0808, #2D1010); border: 2px solid var(--rojo); }
.resumen-grande.neu { background: var(--gris3); border: 2px solid var(--linea); }

.rg-lbl { font-size: 12px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 6px; }
.resumen-grande.pos .rg-lbl { color: var(--verde); }
.resumen-grande.neg .rg-lbl { color: var(--rojo); }
.resumen-grande.neu .rg-lbl { color: var(--texto2); }

.rg-val {
  font-family: var(--font-h);
  font-size: 52px;
  font-weight: 900;
  line-height: 1;
}
.resumen-grande.pos .rg-val { color: var(--verde); }
.resumen-grande.neg .rg-val { color: var(--rojo); }
.resumen-grande.neu .rg-val { color: var(--texto2); }

.rg-estado {
  font-size: 14px;
  font-weight: 600;
  margin-top: 6px;
}
.resumen-grande.pos .rg-estado { color: rgba(0,184,148,.7); }
.resumen-grande.neg .rg-estado { color: rgba(192,57,43,.7); }

/* ============================================================
   FORMULARIOS / MODALES
============================================================ */
.overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.8);
  z-index: 300;
  align-items: flex-end;
  justify-content: center;
}
.overlay.open { display: flex; }

.sheet {
  background: var(--gris2);
  border-radius: 20px 20px 0 0;
  border-top: 2px solid var(--rojo);
  padding: 20px 18px 28px;
  width: 100%;
  max-width: 480px;
  max-height: 90vh;
  overflow-y: auto;
}
.sheet.blue { border-top-color: var(--azul); }
.sheet.verde { border-top-color: var(--verde); }

.sheet-title {
  font-family: var(--font-h);
  font-size: 22px;
  font-weight: 800;
  margin-bottom: 16px;
}

.form-group {
  margin-bottom: 12px;
}
.form-lbl {
  font-size: 11px;
  font-weight: 700;
  color: var(--texto2);
  letter-spacing: .5px;
  text-transform: uppercase;
  margin-bottom: 5px;
  display: block;
}
.form-input {
  width: 100%;
  background: var(--gris4);
  border: 1.5px solid var(--linea);
  border-radius: 10px;
  color: var(--texto);
  padding: 12px 13px;
  font-size: 15px;
  font-weight: 600;
  outline: none;
  font-family: var(--font-b);
  transition: border-color .15s;
}
.form-input:focus { border-color: var(--rojo); }

.form-select {
  width: 100%;
  background: var(--gris4);
  border: 1.5px solid var(--linea);
  border-radius: 10px;
  color: var(--texto);
  padding: 12px 13px;
  font-size: 15px;
  font-weight: 600;
  outline: none;
  font-family: var(--font-b);
  appearance: none;
  cursor: pointer;
}
.form-select:focus { border-color: var(--rojo); }

.form-row { display: flex; gap: 10px; }
.form-row .form-group { flex: 1; }

/* ============================================================
   BUTTONS
============================================================ */
.btn {
  border: none;
  border-radius: 11px;
  padding: 13px 18px;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  font-family: var(--font-b);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  transition: opacity .15s, transform .1s;
}
.btn:active { opacity: .85; transform: scale(.98); }

.btn-rojo   { background: var(--rojo); color: #fff; }
.btn-verde  { background: var(--verde); color: #fff; }
.btn-gris   { background: var(--gris5); color: var(--texto2); border: 1.5px solid var(--linea); }
.btn-warn   { background: #2A1800; color: var(--amarillo); border: 1.5px solid #5A3500; }

.btn-full  { width: 100%; }
.btn-sm    { padding: 7px 12px; font-size: 12px; border-radius: 8px; }

.btn-row { display: flex; gap: 10px; margin-top: 14px; }
.btn-row .btn { flex: 1; }

.ico-btn {
  background: none;
  border: none;
  color: var(--texto3);
  font-size: 16px;
  cursor: pointer;
  padding: 5px 6px;
  border-radius: 7px;
}
.ico-btn:hover { color: var(--texto); }

/* ============================================================
   DIVIDER
============================================================ */
.divider {
  height: 1px;
  background: var(--linea);
  margin: 14px 0;
}

/* ============================================================
   EMPTY STATE
============================================================ */
.empty {
  text-align: center;
  padding: 32px 20px;
  color: var(--texto2);
}
.empty .eico { font-size: 38px; margin-bottom: 10px; }
.empty .etxt { font-size: 14px; }

/* ============================================================
   TOAST
============================================================ */
.toast {
  position: fixed;
  bottom: 80px;
  left: 50%;
  transform: translateX(-50%) translateY(12px);
  background: var(--gris4);
  border: 1px solid var(--linea);
  color: var(--texto);
  padding: 10px 20px;
  border-radius: 12px;
  font-size: 13px;
  font-weight: 600;
  opacity: 0;
  pointer-events: none;
  transition: all .28s;
  z-index: 999;
  white-space: nowrap;
  box-shadow: var(--sombra);
  font-family: var(--font-b);
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ============================================================
   CHIPS TIPO GASTO
============================================================ */
.tipo-chips {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}
.tipo-chip {
  padding: 7px 14px;
  border-radius: 20px;
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  border: 1.5px solid var(--linea);
  background: var(--gris4);
  color: var(--texto2);
  font-family: var(--font-b);
  transition: all .15s;
}
.tipo-chip.selected-diario   { border-color:var(--rojo); color:var(--rojo); background:var(--rojo-bg); }
.tipo-chip.selected-duracion { border-color:var(--azul); color:var(--azul); background:#0A1828; }
.tipo-chip.selected-extra    { border-color:var(--amarillo); color:var(--amarillo); background:#1A1500; }

/* ============================================================
   BACKUP SECTION
============================================================ */
.backup-row {
  display: flex;
  gap: 10px;
  margin-top: 10px;
}

/* ============================================================
   NUEVO DÃA FLOATING BTN
============================================================ */
.fab {
  position: fixed;
  bottom: 80px;
  right: 16px;
  z-index: 200;
  background: var(--rojo);
  color: white;
  border: none;
  border-radius: 14px;
  padding: 12px 16px;
  font-size: 12px;
  font-weight: 700;
  cursor: pointer;
  font-family: var(--font-b);
  box-shadow: 0 4px 20px rgba(192,57,43,.5);
  display: flex;
  align-items: center;
  gap: 6px;
  transition: opacity .2s;
}
.fab:active { opacity: .85; }
.fab.hidden { display: none; }

/* ============================================================
   PROGRESS BAR (margen)
============================================================ */
.progress-wrap {
  background: var(--gris4);
  border-radius: 6px;
  height: 8px;
  overflow: hidden;
  margin-top: 8px;
}
.progress-bar {
  height: 100%;
  border-radius: 6px;
  transition: width .4s;
}

/* Breakdown lines in resumen */
.breakdown-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 9px 0;
  border-bottom: 1px solid var(--linea);
}
.breakdown-item:last-child { border-bottom: none; }
.breakdown-nombre { font-size: 13px; color: var(--texto2); }
.breakdown-tipo {
  font-size: 10px;
  font-weight: 700;
  padding: 2px 7px;
  border-radius: 5px;
  margin-top: 2px;
}
.bt-diario   { background: var(--rojo-bg); color: var(--rojo); }
.bt-duracion { background: #0A1828; color: var(--azul); }
.bt-extra    { background: #1A1500; color: var(--amarillo); }
.breakdown-monto { font-weight: 700; font-size: 14px; }

/* ============================================================
   RESUMEN SEMANAL â€” bloque separado
============================================================ */
.bloque-periodo {
  margin-bottom: 16px;
}

.periodo-header {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 10px;
}

.periodo-badge {
  font-family: var(--font-h);
  font-size: 11px;
  font-weight: 800;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  padding: 4px 10px;
  border-radius: 6px;
}
.periodo-badge.dia    { background: #1A0C0C; color: var(--rojo); border: 1px solid var(--rojo-dk); }
.periodo-badge.semana { background: #0A1020; color: #5DADE2;     border: 1px solid #1F5A8A; }

.periodo-fecha-rango {
  font-size: 11px;
  color: var(--texto3);
  font-weight: 600;
}

.periodo-grid {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 8px;
  margin-bottom: 10px;
}

.periodo-stat {
  background: var(--gris3);
  border: 1.5px solid var(--linea);
  border-radius: 11px;
  padding: 11px 10px;
  text-align: center;
}

.periodo-stat .ps-lbl {
  font-size: 9px;
  font-weight: 800;
  letter-spacing: .8px;
  text-transform: uppercase;
  color: var(--texto3);
  margin-bottom: 5px;
}

.periodo-stat .ps-val {
  font-family: var(--font-h);
  font-size: 19px;
  font-weight: 900;
  line-height: 1;
}

.periodo-stat.ing  { border-color: rgba(0,184,148,.25); }
.periodo-stat.ing .ps-val { color: var(--verde); }
.periodo-stat.gas  { border-color: rgba(192,57,43,.25); }
.periodo-stat.gas .ps-val { color: var(--rojo); }
.periodo-stat.gan.pos { border-color: var(--verde); background: var(--verde-bg); }
.periodo-stat.gan.pos .ps-val { color: var(--verde); }
.periodo-stat.gan.neg { border-color: var(--rojo);  background: var(--rojo-bg); }
.periodo-stat.gan.neg .ps-val { color: var(--rojo); }
.periodo-stat.gan.neu .ps-val { color: var(--texto2); }

.periodo-resultado {
  border-radius: 12px;
  padding: 14px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

<script>
'use strict';

/* =========================================================
   LAYOUT HELPER â€” declared early so header updater can use it
========================================================= */
function ajustarLayout() {
  const hdr = document.getElementById('main-header');
  const content = document.getElementById('main-content');
  if (hdr && content) {
    const h = hdr.getBoundingClientRect().height;
    content.style.top = h + 'px';
  }
}

/* =========================================================
   HELPERS
========================================================= */
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }
function fmt(n) { return '$' + Number(n||0).toLocaleString('es-MX',{minimumFractionDigits:2,maximumFractionDigits:2}); }
function hoy()  { return new Date().toLocaleDateString('es-MX',{weekday:'long',day:'numeric',month:'long'}); }

// Returns today as YYYY-MM-DD string
function fechaHoy() {
  const d = new Date();
  return d.getFullYear() + '-' +
    String(d.getMonth()+1).padStart(2,'0') + '-' +
    String(d.getDate()).padStart(2,'0');
}

// Returns array of last N date strings YYYY-MM-DD (including today), oldest first
function ultimas7Fechas() {
  const arr = [];
  for (let i=6; i>=0; i--) {
    const d = new Date();
    d.setDate(d.getDate() - i);
    arr.push(
      d.getFullYear() + '-' +
      String(d.getMonth()+1).padStart(2,'0') + '-' +
      String(d.getDate()).padStart(2,'0')
    );
  }
  return arr;
}

// Short human-readable date range label
function rangoSemana() {
  const dias = ultimas7Fechas();
  const fmt2 = s => {
    const [y,m,d] = s.split('-');
    return `${d}/${m}`;
  };
  return `${fmt2(dias[0])} â€“ ${fmt2(dias[6])}`;
}

function cargar(k,def) {
  try { const v=localStorage.getItem(k); return v?JSON.parse(v):def; } catch{ return def; }
}
function guardar(k,v) { try{localStorage.setItem(k,JSON.stringify(v));}catch{} }

function toast(msg,dur=2200) {
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  clearTimeout(el._t);
  el._t=setTimeout(()=>el.classList.remove('show'),dur);
}

/* =========================================================
   ESTADO
========================================================= */
let negocios  = cargar('np_negocios', []);
let gastos    = cargar('np_gastos',   []);   // [{id,negId,nombre,monto,tipo,dias}]
let ingresos  = cargar('np_ingresos', []);   // [{id,negId,nombre,monto}]
let negActivo = cargar('np_activo',   null);

// Asegura que haya negocios demo si es primera vez
if (negocios.length === 0) {
  negocios = [
    {id:uid(), nombre:'Carne Asada', tipo:'Fin de semana', emoji:'ðŸ¥©'},
    {id:uid(), nombre:'CarnicerÃ­a',  tipo:'Diario',        emoji:'ðŸ”ª'},
  ];
  guardar('np_negocios', negocios);
}

// Selecciona el primero si no hay activo o no existe
if (!negActivo || !negocios.find(n=>n.id===negActivo)) {
  negActivo = negocios[0]?.id || null;
  guardar('np_activo', negActivo);
}

/* =========================================================
   CÃLCULOS
========================================================= */
function gastosDiarios(negId) {
  return gastos
    .filter(g=>g.negId===negId && g.tipo==='diario')
    .reduce((s,g)=>s+g.monto,0);
}

function gastosDuracion(negId) {
  return gastos
    .filter(g=>g.negId===negId && g.tipo==='duracion')
    .reduce((s,g)=>s+(g.monto/(g.dias||1)),0);
}

function gastosExtra(negId) {
  return gastos
    .filter(g=>g.negId===negId && g.tipo==='extra')
    .reduce((s,g)=>s+g.monto,0);
}

function totalGastosOperativos(negId) {
  return gastosDiarios(negId) + gastosDuracion(negId);
}

function totalIngresos(negId, fecha) {
  const f = fecha || fechaHoy();
  return ingresos
    .filter(i=>i.negId===negId && (i.fecha||fechaHoy())===f)
    .reduce((s,i)=>s+i.monto,0);
}

function ganancia(negId) {
  return totalIngresos(negId) - totalGastosOperativos(negId);
}

/* =========================================================
   MIGRACIÃ“N â€” asignar fecha a registros sin ella
========================================================= */
function migrarFechas() {
  const hd = fechaHoy();
  let cambio = false;
  gastos.forEach(g  => { if (!g.fecha) { g.fecha = hd; cambio = true; } });
  ingresos.forEach(i => { if (!i.fecha) { i.fecha = hd; cambio = true; } });
  if (cambio) {
    guardar('np_gastos',   gastos);
    guardar('np_ingresos', ingresos);
  }
}

/* =========================================================
   CÃLCULOS SEMANALES
========================================================= */

// Ingresos de los Ãºltimos 7 dÃ­as para un negocio
function ingresosSemanales(negId) {
  const fechas = new Set(ultimas7Fechas());
  return ingresos
    .filter(i => i.negId === negId && fechas.has(i.fecha || fechaHoy()))
    .reduce((s,i) => s + i.monto, 0);
}

// Gastos diarios de los Ãºltimos 7 dÃ­as (solo tipo=diario, con fecha en rango)
function gastosDiariosSemanales(negId) {
  const fechas = new Set(ultimas7Fechas());
  return gastos
    .filter(g => g.negId===negId && g.tipo==='diario' && fechas.has(g.fecha || fechaHoy()))
    .reduce((s,g) => s + g.monto, 0);
}

// Gastos por duraciÃ³n: cada uno aporta (monto/dias) Ã— cant_dÃ­as_en_ventana
// Un gasto de duraciÃ³n cubre desde su fecha de creaciÃ³n durante g.dias dÃ­as.
// Para la ventana semanal, contamos cuÃ¡ntos de esos dÃ­as caen en los Ãºltimos 7.
function gastosDuracionSemanales(negId) {
  const ventana = ultimas7Fechas(); // ["2025-01-01", ..., "2025-01-07"]
  const ventanaSet = new Set(ventana);

  return gastos
    .filter(g => g.negId===negId && g.tipo==='duracion')
    .reduce((sum, g) => {
      const costoPorDia = g.monto / (g.dias || 1);
      const inicio = g.fecha || fechaHoy();

      // Genera todas las fechas que cubre este gasto
      let diasEnVentana = 0;
      for (let i=0; i < (g.dias||1); i++) {
        const d = new Date(inicio + 'T00:00:00');
        d.setDate(d.getDate() + i);
        const key = d.getFullYear() + '-' +
          String(d.getMonth()+1).padStart(2,'0') + '-' +
          String(d.getDate()).padStart(2,'0');
        if (ventanaSet.has(key)) diasEnVentana++;
      }
      return sum + costoPorDia * diasEnVentana;
    }, 0);
}

// Gastos operativos semanales = diarios en rango + duraciÃ³n prorrateada
function gastosOperativosSemanales(negId) {
  return gastosDiariosSemanales(negId) + gastosDuracionSemanales(negId);
}

// Ganancia semanal
function gananciaSemanales(negId) {
  return ingresosSemanales(negId) - gastosOperativosSemanales(negId);
}

/* =========================================================
   HEADER
========================================================= */

  document.getElementById('hdr-fecha').textContent = hoy();

  const neg = negocios.find(n=>n.id===negActivo);

/* =========================================================
   RENDER: NEGOCIOS
========================================================= */
function renderNegocios() {
  const wrap = document.getElementById('lista-negocios');

  if (negocios.length===0) {
    wrap.innerHTML = `<div class="empty"><div class="eico">ðŸª</div><div class="etxt">Sin negocios aÃºn.<br>Crea tu primero.</div></div>`;

function renderGastos() {

    const diario = g.tipo==='duracion' ? g.monto/(g.dias||1) : (g.tipo==='diario'?g.monto:0);
    const tipoLabel = g.tipo==='diario'?'ðŸ“… Diario':g.tipo==='duracion'?`ðŸ“† ${g.dias}d`:'âš¡ Extra';

        <div class="item-info">

        </div>

          <div style="display:flex;gap:5px;margin-top:5px;justify-content:flex-end">
            <button class="ico-btn" onclick="editarGasto('${g.id}')">âœï¸</button>

    document.getElementById('ingresos-total-bar').innerHTML = '';

/* =========================================================
   NUEVO DÃA
========================================================= */
function pedirNuevoDia() {
  confirmar('ðŸŒ… Â¿Nuevo dÃ­a?',
    'Se guardarÃ¡n los ingresos de hoy en el historial y podrÃ¡s empezar desde cero.',
    ()=>{
      // Guardar snapshot del dÃ­a en historial
      const hd = fechaHoy();
      const historial = cargar('np_historial', []);
      // Un snapshot por negocio con ingresos del dÃ­a
      negocios.forEach(neg => {
        const ingDia = ingresos.filter(i=>i.negId===neg.id && (i.fecha||hd)===hd);
        if (ingDia.length > 0) {
          const snap = {
            fecha: hd,
            negId: neg.id,
            negNombre: neg.nombre,
            negEmoji: neg.emoji,
            ingresos: ingDia,
            totalIng: ingDia.reduce((s,i)=>s+i.monto,0),
            totalGastos: totalGastosOperativos(neg.id),
            ganancia: totalIngresos(neg.id, hd) - totalGastosOperativos(neg.id)
          };
          // Reemplaza si ya existe snapshot de ese dÃ­a+negocio
          const idx = historial.findIndex(h=>h.fecha===hd&&h.negId===neg.id);
          if (idx>=0) historial[idx]=snap; else historial.unshift(snap);
        }
      });
      guardar('np_historial', historial);
      // Borrar ingresos de hoy
      ingresos = ingresos.filter(i=>(i.fecha||hd)!==hd);
      guardar('np_ingresos',ingresos);
      renderTab(tabActual);
      toast('ðŸŒ… Â¡Nuevo dÃ­a iniciado! Historial guardado.');
    }
  );
}

function exportarDatos() {
  const datos = {

    fecha: new Date().toISOString(),
    negocios,
    gastos,
    ingresos,
    negActivo,
    historial: cargar('np_historial', [])
  };
  const blob = new Blob([JSON.stringify(datos,null,2)],{type:'application/json'});
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href     = url;
  a.download = `negocio-pro-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
  toast('ðŸ“¤ Datos exportados');
}

  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const datos = JSON.parse(e.target.result);
      if (!datos.negocios) throw new Error('Formato invÃ¡lido');
      negocios  = datos.negocios  || [];
      gastos    = datos.gastos    || [];
      ingresos  = datos.ingresos  || [];
      negActivo = datos.negActivo || negocios[0]?.id || null;
      guardar('np_negocios',negocios);
      guardar('np_gastos',gastos);
      guardar('np_ingresos',ingresos);
      guardar('np_activo',negActivo);
      if (datos.historial) guardar('np_historial', datos.historial);
      renderTab(tabActual);
      toast('ðŸ“¥ Datos importados correctamente');
    } catch {
      toast('âŒ Archivo invÃ¡lido');
    }
    event.target.value='';
  };
  reader.readAsText(file);
}

/* =========================================================
   MODAL CONFIRM
========================================================= */
let pendFn = null;

function confirmar(title,body,fn) {
  document.getElementById('conf-title').textContent = title;
  document.getElementById('conf-body').textContent  = body;
  pendFn = fn;
  document.getElementById('ov-confirm').classList.add('open');
}

document.getElementById('conf-ok').addEventListener('click',()=>{
  if(pendFn){pendFn();pendFn=null;}
  cerrarOverlays();
});

function cerrarOverlays() {
  document.querySelectorAll('.overlay').forEach(o=>o.classList.remove('open'));
}

document.querySelectorAll('.overlay').forEach(o=>{
  o.addEventListener('click',e=>{if(e.target===o)cerrarOverlays();});
});

/* =========================================================
   UTILS
========================================================= */
function esc(s) {
  return String(s??'')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Migrar registros existentes sin fecha
migrarFechas();

actualizarHeader();
renderNegocios();
